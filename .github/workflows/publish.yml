name: Publish

on:
    push:
        branches:
            - main

# Least-privilege default for the workflow; job overrides as needed
permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun test

            - name: Enforce root and UI coverage
              run: bun run coverage

            - name: Build project
              run: bun run build

            - name: Resolve package version
              id: package
              run: |
                  echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
                  echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Check npm for existing version
              id: npm
              run: |
                  if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
                    echo "already_published=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "already_published=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish package to npm
              if: steps.npm.outputs.already_published == 'false'
              run: npm publish --provenance --access public

            - name: Ensure GitHub release exists
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="v${{ steps.package.outputs.version }}"
                  if gh release view "$tag" >/dev/null 2>&1; then
                    echo "GitHub release $tag already exists"
                  else
                    gh release create "$tag" --generate-notes --title "$tag"
                  fi
