name: Node.js CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun test

            - name: Enforce root and UI coverage
              run: bun run coverage

            - name: Build project
              run: bun run build

            - name: Upload results to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/lcov.info,./apps/ui/coverage/lcov.info
                  token: ${{ secrets.CODECOV_TOKEN }}
